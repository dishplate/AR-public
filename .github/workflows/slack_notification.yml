name: Slack Notification

on:
  push:
    branches:
      - dev
  pull_request:
    types:
      - opened
      - reopened
      - synchronize
      - closed
    branches:
      - main
      - dev
  pull_request_review:
    types:
      - submitted
  release:
    types:
      - published
      - created
      - edited
      - deleted
  workflow_run:
    workflows:
      - Copilot Code Review
    types:
      - completed
  workflow_dispatch: {}
  create: {}
  delete: {}
  deployment: {}
  deployment_status: {}

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Send Slack notification
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          EVENT_NAME: ${{ github.event_name }}
          BRANCH_NAME: ${{ github.ref_name }}
          PR_ACTION: ${{ github.event.action || '' }}
          PR_BASE: ${{ github.event.pull_request.base.ref || '' }}
          PR_HEAD: ${{ github.event.pull_request.head.ref || '' }}
          PR_NUMBER: ${{ github.event.pull_request.number || '' }}
          PR_TITLE: ${{ github.event.pull_request.title || '' }}
          PR_URL: ${{ github.event.pull_request.html_url || '' }}
          MERGED: ${{ github.event.pull_request.merged || false }}
          REVIEW_STATE: ${{ github.event.review.state || '' }}
          RELEASE_ACTION: ${{ github.event.action || '' }}
          RELEASE_TAG: ${{ github.event.release.tag_name || '' }}
          RELEASE_NAME: ${{ github.event.release.name || '' }}
          RELEASE_URL: ${{ github.event.release.html_url || '' }}
          WORKFLOW_NAME: ${{ github.event.workflow_run.name || '' }}
          WORKFLOW_CONCLUSION: ${{ github.event.workflow_run.conclusion || '' }}
          WORKFLOW_RUN_URL: ${{ github.event.workflow_run.html_url || '' }}
          CREATE_TYPE: ${{ github.event.ref_type || '' }}
          CREATE_REF: ${{ github.event.ref || '' }}
          DELETE_TYPE: ${{ github.event.ref_type || '' }}
          DELETE_REF: ${{ github.event.ref || '' }}
          DEPLOYMENT_ENV: ${{ github.event.deployment.environment || '' }}
          DEPLOYMENT_ID: ${{ github.event.deployment.id || '' }}
          DEPLOYMENT_STATUS: ${{ github.event.deployment_status.state || '' }}
          DEPLOYMENT_STATUS_ENV: ${{ github.event.deployment_status.environment || '' }}
        run: |
          set -e

          DETAILS=""
          if [ "$EVENT_NAME" = "push" ]; then
            TEXT="Commit pushed to dev on branch $BRANCH_NAME"
            DETAILS="*Branch:* \\`$BRANCH_NAME\\`\n*Commit:* \\`$GITHUB_SHA\\`"
          elif [ "$EVENT_NAME" = "pull_request" ]; then
            if [ "$PR_ACTION" = "closed" ]; then
              if [ "$MERGED" = "true" ]; then
                TEXT="Pull request merged to ${PR_BASE}: #${PR_NUMBER} ${PR_TITLE}"
                DETAILS="*PR:* <$PR_URL|#${PR_NUMBER}>\n*Branch:* ${PR_HEAD} → ${PR_BASE}"
              else
                echo "Skipping closed unmerged PR notification"
                exit 0
              fi
            else
              TEXT="Pull request ${PR_ACTION} to ${PR_BASE}: #${PR_NUMBER} ${PR_TITLE}"
              DETAILS="*PR:* <$PR_URL|#${PR_NUMBER}>\n*Branch:* ${PR_HEAD} → ${PR_BASE}"
            fi
          elif [ "$EVENT_NAME" = "pull_request_review" ]; then
            if [ "$PR_BASE" != "main" ]; then
              echo "Skipping review notification for PR base branch $PR_BASE"
              exit 0
            fi
            if [ "$REVIEW_STATE" = "approved" ]; then
              TEXT="PR approved on main: #${PR_NUMBER} ${PR_TITLE}"
            elif [ "$REVIEW_STATE" = "changes_requested" ]; then
              TEXT="PR review requested changes on main: #${PR_NUMBER} ${PR_TITLE}"
            elif [ "$REVIEW_STATE" = "dismissed" ]; then
              TEXT="PR review dismissed on main: #${PR_NUMBER} ${PR_TITLE}"
            else
              echo "No notification for review state: $REVIEW_STATE"
              exit 0
            fi
            DETAILS="*PR:* <$PR_URL|#${PR_NUMBER}>\n*Review:* ${REVIEW_STATE}"
          elif [ "$EVENT_NAME" = "release" ]; then
            TEXT="Release ${RELEASE_ACTION}: ${RELEASE_NAME:-$RELEASE_TAG}"
            DETAILS="*Release:* <$RELEASE_URL|${RELEASE_NAME:-$RELEASE_TAG}>"
          elif [ "$EVENT_NAME" = "workflow_run" ]; then
            TEXT="Workflow ${WORKFLOW_NAME} completed with ${WORKFLOW_CONCLUSION}"
            DETAILS="*Workflow:* <$WORKFLOW_RUN_URL|${WORKFLOW_NAME}>"
          elif [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            TEXT="Manual workflow dispatch requested"
          elif [ "$EVENT_NAME" = "create" ]; then
            TEXT="${CREATE_TYPE^} created: ${CREATE_REF}"
          elif [ "$EVENT_NAME" = "delete" ]; then
            TEXT="${DELETE_TYPE^} deleted: ${DELETE_REF}"
          elif [ "$EVENT_NAME" = "deployment" ]; then
            TEXT="Deployment created: ${DEPLOYMENT_ID} to ${DEPLOYMENT_ENV}"
          elif [ "$EVENT_NAME" = "deployment_status" ]; then
            TEXT="Deployment status ${DEPLOYMENT_STATUS} for ${DEPLOYMENT_STATUS_ENV}"
          else
            echo "No notification for event: $EVENT_NAME"
            exit 0
          fi

          PAYLOAD=$(python - <<'PY'
          import json, os
          text = os.environ['TEXT']
          details = os.environ['DETAILS']
          blocks = [{
              'type': 'section',
              'text': {'type': 'mrkdwn', 'text': f'*{text}*'}
          }]
          if details:
              blocks.append({
                  'type': 'section',
                  'text': {'type': 'mrkdwn', 'text': details}
              })
          payload = {'text': text, 'blocks': blocks}
          print(json.dumps(payload))
          PY
          )

          curl -X POST -H 'Content-Type: application/json' \
            --data "$PAYLOAD" \
            "$SLACK_WEBHOOK_URL"
